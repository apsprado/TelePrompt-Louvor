<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelePrompt Louvor</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <header id="metadata-header">
            <h1 id="song-title">Título da Música</h1>
            <h2 id="song-author">Autor da Música</h2>
        </header>

        <main id="teleprompter-area">
            <button id="btn-open-settings" class="settings-btn" title="Configurações">⚙️</button>
            <div id="slide-content">
                Carregando...
            </div>
            <div id="end-message" style="display: none;">
                FIM DA MÚSICA
            </div>
        </main>

        <div id="controls">
            <!-- Botões de navegação serão inseridos/controlados aqui -->
        </div>

        <div id="settings-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h2>Configurações</h2>
                <div class="setting-group">
                    <label for="bg-color-picker">Cor de Fundo</label>
                    <input type="color" id="bg-color-picker" value="#000000">
                </div>
                <div class="setting-group">
                    <label for="font-color-picker">Cor da Fonte</label>
                    <input type="color" id="font-color-picker" value="#ffffff">
                </div>
                <div class="setting-group">
                    <label for="font-size-range">Tamanho da Fonte</label>
                    <input type="range" id="font-size-range" min="2" max="12" step="0.5" value="5">
                </div>
                <button id="btn-close-settings" class="btn-close">Fechar</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/parser.js"></script>
    <script src="js/controller.js"></script>
    <script src="js/midi.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
